name: Secret Scan

# Defense-in-depth: catch committed credentials before/after they land.
# Scans the full git history (fetch-depth: 0) on every push and PR so that a
# secret can never silently sit in history again.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # weekly full-history re-scan (Mondays 06:00 UTC)

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history, not just the tip
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks-action is free for public repos; no license needed.
