name: Secret Scan

# Defense-in-depth: scan the FULL git history (all refs) for committed secrets
# on every push and PR. We run the gitleaks CLI directly rather than the
# push-diff action, because after a history rewrite / force-push the
# "previous commit" the action tries to diff against no longer exists.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # weekly full-history re-scan (Mondays 06:00 UTC)

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history, not just the tip

      - name: Install gitleaks
        run: |
          VERSION=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full git history (all refs)
        run: >
          gitleaks git .
          --config .gitleaks.toml
          --redact
          --verbose
          --exit-code 1
          --log-opts=--all
